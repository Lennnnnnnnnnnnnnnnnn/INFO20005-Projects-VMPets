<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <!--  CSS  -->
    <link rel="stylesheet" href="style.css">
    <!--  Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asul:wght@400;700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=WindSong:wght@400;500&display=swap" rel="stylesheet">

</head>
<body id="Product-detail">
    <header>

    </header>

    <main>
        <!-- Product Detail Section -->
        <section class="detail-content">
            <!-- Product Image -->
            <div class="product-img">
                <img src="" alt="">
                <div class="enlarge-icon">
                    <img src="images/icons/enlarge.png" alt="enlarge icon">
                </div>
            </div>

            <!-- Product Info -->
            <div class="product-info">
                <h1></h1>
                <p class="price"></p>
                <p class="size">Size: <strong></strong></p>

                <!-- Variants (populated by JS) -->
                <div class="product-variants"></div>
            </div>
        </section>

        <!-- Quantity + Add to Cart -->
        <div class="add-cart-functions">
            <div class="quantity">
                <button id="qty-minus">-</button>
                <input type="number" id="qty" value="1" min="1">
                <button id="qty-plus">+</button>
            </div>
            <div class="add-button">
                <button id="add-to-cart">Add to Cart</button>
            </div>
        </div>

        <!-- Accordion Sections (content populated by JS) -->
        <section class="product-description">
            <details>
                <summary>Ingredients</summary>
                <p></p>
            </details>
            <details>
                <summary>Description</summary>
                <p></p>
            </details>
        </section>

        <!-- Related Products (populated by JS) -->
        <section class="related-products"></section>
    </main>

    <footer>

    </footer>
    <script src="scripts/script.js"></script>
</body>
</html>
