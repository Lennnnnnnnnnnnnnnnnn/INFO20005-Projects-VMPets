<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Sale</title>
    <link rel="stylesheet" href="style.css">

</head>
<body id="on-sale-page">

    <header></header>
    
    <main>
        <div class="page-heading">
            <h1>On Sale</h1>
        </div>

        <div class="product-grid product-grid-single">

            <article class="product-card product-card-row">
                <div class="product-card-img">
                    <img src="images/product_img/dog_food_1.png" alt="Dog Food">
                    <span class="sale-badge">SALE</span>
                    <div class="carousel-dots dots-bottom">
                        <div class="dot dot-active"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
                <div class="product-card-info">
                    <h3>Dog Food Product Name</h3>
                    <p><span class="price">$99.99</span></p>
                    <div class="carousel-controls">
                        <button class="carousel-btn"> Prev </button>
                        <button class="carousel-btn"> Next </button>
                    </div>
                </div>
            </article>

            <article class="product-card product-card-row">
                <div class="product-card-img">
                    <img src="images/product_img/dog_food_2.png" alt="Dog Food">
                    <span class="sale-badge">SALE</span>
                    <div class="carousel-dots dots-bottom">
                        <div class="dot dot-active"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
                <div class="product-card-info">
                    <h3>Dog Food Product Name</h3>
                    <p><span class="price">$99.99</span></p>
                    <div class="carousel-controls">
                        <button class="carousel-btn"> Prev </button>
                        <button class="carousel-btn"> Next </button>
                    </div>
                </div>
            </article>

        </div>
    </main>
    
    <footer>

    </footer>

    <script src="scripts/script.js"></script>
</body>
</html>
