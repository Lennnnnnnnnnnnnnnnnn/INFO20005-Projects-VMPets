<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Sale</title>
    <!--  CSS  -->
    <link rel="stylesheet" href="style.css">
    <!--  Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asul:wght@400;700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=WindSong:wght@400;500&display=swap" rel="stylesheet">
</head>
<body id="on-sale-page">

    <header></header>

    <main>
        <!--  Page Heading  -->
        <div class="page-heading">
            <h1>On Sale</h1>
            <p class="product-count" id="product-count"></p>
        </div>

        <!--  Filter & Sort Bar  -->
        <div class="filter-bar">
            <span>Filter</span>
            <span>Sort by:
                <select name="sort" id="sort-select">
                    <option value="default">Default</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                </select>
            </span>
        </div>

        <!--  Product Grid (populated by JS)  -->
        <div class="product-grid" id="product-grid"></div>
    </main>

    <footer></footer>

    <!--  Main Script  -->
    <script src="scripts/script.js"></script>
</body>
</html>
