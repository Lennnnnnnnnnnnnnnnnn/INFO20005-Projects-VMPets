<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asul:wght@400;700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=WindSong:wght@400;500&display=swap" rel="stylesheet">
</head>
<body id="payment-page">
    <header></header>

    <main>
        <h1>Checkout</h1>

        <!-- Order Summary -->
        <section class="payment-card">
            <div class="payment-card-header">
                <h2>Order Summary</h2>
                <span class="summary-badge">2 items</span>
            </div>

            <div class="summary-item">
                <div class="summary-item-info">
                    <p class="summary-item-name">Product Name</p>
                    <p class="summary-item-detail">Brief Description · x1</p>
                </div>
                <p class="price">$99.99</p>
            </div>
            <div class="summary-item">
                <div class="summary-item-info">
                    <p class="summary-item-name">Product Name</p>
                    <p class="summary-item-detail">Brief Description · x1</p>
                </div>
                <p class="price">$99.99</p>
            </div>

            <div class="summary-divider"></div>

            <div class="summary-total-row">
                <span>Subtotal</span>
                <span>$199.98</span>
            </div>
            <div class="summary-total-row">
                <span>Shipping</span>
                <span class="free-shipping">Free</span>
            </div>
            <div class="summary-total-row summary-grand-total">
                <span>Total</span>
                <span>$199.98</span>
            </div>
        </section>

        <!-- Delivery Information -->
        <section class="payment-card">
            <div class="payment-card-header">
                <h2>Delivery Information</h2>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" name="first-name" placeholder="Jane" autocomplete="given-name">
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name" placeholder="Doe" autocomplete="family-name">
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="jane@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="0400 000 000" autocomplete="tel">
            </div>
            <div class="form-group">
                <label for="address">Street Address</label>
                <input type="text" id="address" name="address" placeholder="123 Main Street" autocomplete="street-address">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="suburb">Suburb</label>
                    <input type="text" id="suburb" name="suburb" placeholder="Melbourne" autocomplete="address-level2">
                </div>
                <div class="form-group">
                    <label for="postcode">Postcode</label>
                    <input type="text" id="postcode" name="postcode" placeholder="3000" maxlength="4" inputmode="numeric" autocomplete="postal-code">
                </div>
            </div>
        </section>

        <!-- Payment Method -->
        <section class="payment-card">
            <div class="payment-card-header">
                <h2>Payment Method</h2>
            </div>

            <div class="payment-method-tabs">
                <button class="method-tab method-tab-active" data-method="card">
                    Credit / Debit Card
                </button>
                <button class="method-tab" data-method="paypal">
                    PayPal
                </button>
            </div>

            <!-- Card Details -->
            <div id="card-fields">
                <div class="form-group">
                    <label for="card-number">Card Number</label>
                    <input type="text" id="card-number" name="card-number" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric" autocomplete="cc-number">
                </div>
                <div class="form-group">
                    <label for="card-name">Cardholder Name</label>
                    <input type="text" id="card-name" name="card-name" placeholder="Jane Doe" autocomplete="cc-name">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="expiry">Expiry Date</label>
                        <input type="text" id="expiry" name="expiry" placeholder="MM / YY" maxlength="7" inputmode="numeric" autocomplete="cc-exp">
                    </div>
                    <div class="form-group">
                        <label for="csv">CSV</label>
                        <input type="text" id="csv" name="csv" placeholder="123" maxlength="4" inputmode="numeric" autocomplete="cc-csc">
                    </div>
                </div>
            </div>

            <!-- PayPal -->
            <div id="paypal-fields" class="payment-hidden">
                <p class="paypal-note">You will be redirected to PayPal to complete your payment securely.</p>
            </div>
        </section>

        <!-- Place Order -->
        <button class="place-order-btn" id="place-order">Place Order — $199.98</button>

        <p class="back-link"><a href="shopping_cart.html">← Back to Cart</a></p>
    </main>

    <footer></footer>
    <script src="scripts/script.js"></script>
</body>
</html>
