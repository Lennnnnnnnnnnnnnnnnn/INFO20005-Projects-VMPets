<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <!--  CSS  -->
    <link rel="stylesheet" href="style.css">
    <!--  Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asul:wght@400;700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=WindSong:wght@400;500&display=swap" rel="stylesheet">
</head>

<body id="Home">
    <header>

    </header>

    <main>
        <section id="hero-section">
            <h1>Best Pet Foods For Your Furry Friends</h1>
            <h3>Best out of Best</h3>
            <button id="top-selling" class="btn--hero-section">Shop Now on Top Selling!</button>
        </section>

        <section id="home-banner">
        <div class="banner-cell">
            <div class="b-icon">
                <img src="images/icons/box.png" alt="Free Shipping Icon">
            </div>
            <div class="b-text">
            <p class="b-title">Free shipping</p>
            <p class="b-sub">On all orders over $50</p>
            </div>
        </div>
        <div class="banner-cell">
            <div class="b-icon">
                <img src="images/icons/delivery.png" alt="Fast Delivery Icon">
            </div>
            <div class="b-text">
            <p class="b-title">Fast delivery</p>
            <p class="b-sub">Reliable & on time</p>
            </div>
        </div>
        <div class="banner-cell">
            <div class="b-icon">
                <img src="images/icons/Phone.png" alt="24/7 Support Icon">
            </div>
            <div class="b-text">
            <p class="b-title">24/7 support</p>
            <p class="b-sub">Always here to help</p>
            </div>
        </div>
        </section>

        <section>
            <h2>Shop on Quality Products</h2>
            <div  class="product-containers">
                <div class="category-card view-dogs">
                    <span class="card-tag">✦ 120+ items</span>
                    <div class="card-bottom">
                        <div>
                        <h3>Dogs</h3>
                        <span class="card-sub">Food, treats & more</span>
                        </div>
                        <a href="product_list.html?category=dogs">
                            <button>View All</button>
                        </a>
                    </div>
                </div>

                <div class="category-card view-cats">
                    <span class="card-tag">✦ 200+ items</span>
                    <div class="card-bottom">
                        <div>
                        <h3>Cats</h3>
                        <span class="card-sub">Food, treats & more</span>
                        </div>
                        <a href="product_list.html?category=cats">
                            <button>View All</button>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <img class="home-image-end" src="images/dog_cat_img1.svg" alt="dog and cat cuddling image">
    </main>

    <footer>

    </footer>

    <script src="scripts/script.js"></script>
</body>

</html>
