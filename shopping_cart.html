<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <!--  CSS  -->
    <link rel="stylesheet" href="style.css">
    <!--  Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asul:wght@400;700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=WindSong:wght@400;500&display=swap" rel="stylesheet">

</head>
<body id="cart-page">
    <header>

    </header>

    <main>
        <h1 id="cart-title"></h1>

        <div class="cart-body">
            <!-- Cart Items (populated by JS) -->
            <section class="cart-section"></section>

            <!-- Order Summary -->
            <section class="order-summary">
                <p class="items-selected"></p>
                <div class="order-summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">$0.00</span>
                </div>
                <div class="order-note">
                    <label for="order-note">Order Note</label>
                    <textarea id="order-note" name="order-note" rows="3"></textarea>
                </div>
                <button class="checkout-btn">Checkout Now</button>
            </section>
        </div>

        <!-- Recommended Products (populated by JS) -->
        <section class="recommended-section" id="recommended-section"></section>
    </main>

    <footer>

    </footer>
    <script src="scripts/script.js"></script>
</body>
</html>
