<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <!--  CSS  -->
    <link rel="stylesheet" href="style.css">
    <!--  Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asul:wght@400;700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=WindSong:wght@400;500&display=swap" rel="stylesheet">

</head>
<body>

    <header>

    </header>
    
    <main>
        <div class="page-heading">
            <h1>Product Category Title</h1>
            <p class="product-count">4 Products</p>
        </div>

        <div class="filter-bar">
            <span>Filter</span>
            <span>Sort by:
                <select name="sort">
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="newest">Newest</option>
                </select>
            </span>
        </div>

        <div class="product-grid">

            <article class="product-card">
                <div class="product-card-img">
                    <img src="images/product_img/dog_food_1.png" alt="Product Image">
                    <span class="sale-badge">SALE</span>
                </div>
                <div class="product-card-info">
                    <h3>Product Name</h3>
                    <p>
                        <span class="price">$99.99</span>
                        <del class="original-price">$129.99</del>
                    </p>
                </div>
            </article>

            <article class="product-card">
                <div class="product-card-img">
                    <img src="images/product_img/dog_food_2.png" alt="Product Image">
                    <span class="sale-badge">SALE</span>
                </div>
                <div class="product-card-info">
                    <h3>Product Name</h3>
                    <p>
                        <span class="price">$99.99</span>
                        <del class="original-price">$129.99</del>
                    </p>
                </div>
            </article>

            <article class="product-card">
                <div class="product-card-img">
                    <img src="images/product_img/dog_food_3.png" alt="Product Image">
                </div>
                <div class="product-card-info">
                    <h3>Product Name</h3>
                    <p>
                        <span class="price">$99.99</span>
                    </p>
                </div>
            </article>

            <article class="product-card">
                <div class="product-card-img">
                    <img src="images/product_img/dog_food_4.png" alt="Product Image">
                </div>
                <div class="product-card-info">
                    <h3>Product Name</h3>
                    <p>
                        <span class="price">$99.99</span>
                    </p>
                </div>
            </article>

        </div>
    </main>
    
    <footer>

    </footer>

    <script src="scripts/script.js"></script>
</body>
</html>
